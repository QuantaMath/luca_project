# A descriptive name for your workflow
name: Rust CI

# 1. TRIGGER: This workflow runs on every push to the 'develop' branch
on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

# 2. JOBS: A list of jobs to run. We only have one job for now.
jobs:
  # The name of our job
  check-and-test:
    # The type of virtual machine to run the job on
    runs-on: ubuntu-latest

# 3. STEPS: A list of steps to run in the job
    steps:
      # Step 1: Checks out your repository's code so the job can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up a cache for Cargo dependencies to speed up future runs
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
      # Step 3: Run 'cargo check' to quickly ensure the code compiles
      - name: Run cargo check
        run: cd src-tauri && cargo check --verbose
      
      # Step 4: Run the tests for your Rust code
      - name: Run tests
        run: cd src-tauri && cargo test --verbose
  